# =============================================================
# Molecule verify - 롤 적용 결과 검증 플레이북
# 단순히 "실행됨"이 아니라 "올바르게 적용됨"을 검증
# =============================================================
---
- name: Verify
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    # ----------------------------
    # 패키지 설치 검증
    # ----------------------------
    - name: 필수 패키지 설치 확인
      package_facts:
        manager: auto

    - name: 패키지 설치 여부 검증
      assert:
        that:
          - "'vim' in ansible_facts.packages"
          - "'curl' in ansible_facts.packages"
          - "'git' in ansible_facts.packages"
        fail_msg: "필수 패키지 미설치"
        success_msg: "필수 패키지 설치 확인"

    # ----------------------------
    # 타임존 검증
    # ----------------------------
    - name: 타임존 확인
      command: timedatectl show --property=Timezone --value
      register: current_tz
      changed_when: false

    - name: 타임존 검증 (Asia/Seoul)
      assert:
        that:
          - current_tz.stdout == 'Asia/Seoul'
        fail_msg: "타임존 설정 오류: {{ current_tz.stdout }}"

    # ----------------------------
    # 시스템 파라미터 검증
    # ----------------------------
    - name: sysctl 설정 확인
      command: sysctl -n net.core.somaxconn
      register: somaxconn_value
      changed_when: false

    - name: sysctl 값 검증
      assert:
        that:
          - somaxconn_value.stdout | int >= 65535
        fail_msg: "somaxconn 값이 너무 낮음: {{ somaxconn_value.stdout }}"

    # ----------------------------
    # 디렉토리 생성 검증
    # ----------------------------
    - name: 로그 디렉토리 존재 확인
      stat:
        path: /var/log/app
      register: log_dir

    - name: 로그 디렉토리 검증
      assert:
        that:
          - log_dir.stat.exists
          - log_dir.stat.isdir
        fail_msg: "/var/log/app 디렉토리 미생성"
