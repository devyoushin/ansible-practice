# =============================================================
# Molecule 테스트 설정
# Docker 컨테이너로 롤을 격리된 환경에서 테스트
#
# 설치: pip install molecule molecule-docker
# 실행: cd roles/common && molecule test
#       molecule test --scenario-name default
#       molecule converge  # 롤만 실행 (전체 테스트 X)
#       molecule verify    # 검증만 실행
#       molecule destroy   # 컨테이너 삭제
# =============================================================

dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  # Amazon Linux 2 (실제 배포 환경과 동일)
  - name: amazonlinux2
    image: amazonlinux:2
    pre_build_image: true
    privileged: true     # systemd 사용에 필요
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp

  # 여러 OS 동시 테스트 (선택사항)
  # - name: centos7
  #   image: centos:7
  #   pre_build_image: true

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    host_vars:
      amazonlinux2:
        # 테스트용 변수 (실제 환경과 다르게 설정)
        environment: test
        log_retention_days: 7
        ssh_port: 22

lint: |
  set -e
  ansible-lint
  yamllint .

verifier:
  name: ansible
