# =============================================================
# Molecule converge - 롤 적용 플레이북
# molecule converge 실행 시 이 파일이 사용됨
# =============================================================
---
- name: Converge
  hosts: all
  become: yes

  pre_tasks:
    - name: 패키지 캐시 업데이트
      yum:
        update_cache: yes
      when: ansible_os_family == 'RedHat'

  roles:
    - role: common   # 테스트할 롤 지정
