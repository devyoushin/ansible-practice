# =============================================================
# common 롤 기본 변수
# terraform-ec2의 modules/ec2/variables.tf 역할
# group_vars/all.yml 에서 오버라이드 가능
# =============================================================

---
# 타임존 기본값
timezone: "Asia/Seoul"

# NTP 서버 기본값
ntp_servers:
  - "169.254.169.123"

# 공통 패키지 기본값
common_packages:
  - vim
  - curl
  - wget
  - unzip

# sysctl 설정
sysctl_settings:
  - name: "net.core.somaxconn"
    value: "65535"
  - name: "net.ipv4.tcp_max_syn_backlog"
    value: "65535"
  - name: "fs.file-max"
    value: "65536"
  - name: "vm.swappiness"
    value: "10"

# ulimit 설정
ulimit_nofile_soft: 65536
ulimit_nofile_hard: 65536
