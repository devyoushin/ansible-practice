# =============================================================
# monitoring 롤 핸들러 정의
# =============================================================

---
- name: reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes
  # 새 서비스 파일 배포 후 systemd에 변경 사항 알림 (재시작 전 필수)

- name: restart node_exporter
  ansible.builtin.service:
    name: node_exporter
    state: restarted
  # Node Exporter 바이너리 교체 또는 서비스 파일 변경 시

- name: restart prometheus
  ansible.builtin.service:
    name: prometheus
    state: restarted
  # Prometheus 바이너리 교체 시 (설정 변경은 reload로 충분)

- name: reload prometheus config
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port }}/-/reload"
    method: POST
    status_code: 200
  # prometheus.yml, alert_rules.yml 변경 시 재시작 없이 Hot Reload
  # Prometheus를 --web.enable-lifecycle 플래그로 시작해야 이 엔드포인트가 활성화됨
  # 재시작 없이 설정 변경 적용 → 메트릭 수집 중단 없음
  listen: "reload prometheus config"
  # listen: notify할 때 이 이름을 사용해야 이 핸들러가 실행됨

- name: restart alertmanager
  ansible.builtin.service:
    name: alertmanager
    state: restarted
  # Alertmanager 바이너리 교체 시

- name: reload alertmanager
  ansible.builtin.uri:
    url: "http://localhost:{{ alertmanager_port }}/-/reload"
    method: POST
    status_code: 200
  # alertmanager.yml 변경 시 재시작 없이 Hot Reload
  # 재시작 없이 적용하면 알림 상태(silences, inhibition) 유지됨
