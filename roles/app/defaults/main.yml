# =============================================================
# app role 기본 변수 (Spring Boot 앱 배포)
# 환경별 차이는 group_vars/appservers.yml 에서 오버라이드
# =============================================================

---
# -------------------------------------------------------
# [Java / JDK 설정]
# -------------------------------------------------------
java_version: "17"
# LTS 버전 기준 권장: 11(구형), 17(현재 주력), 21(최신 LTS)
# 11 → 17 변경 시 GC 기본값이 G1GC로 통일되어 성능 향상

java_package: "java-17-amazon-corretto"
# Amazon Corretto: AWS가 관리하는 OpenJDK 배포판
# 일반 환경: java-17-openjdk-devel
# Oracle JDK는 라이선스 비용 발생 (주의)

# -------------------------------------------------------
# [애플리케이션 기본 설정]
# -------------------------------------------------------
app_name: "myapp"
app_version: "1.0.0"
app_user: "appuser"             # 앱 실행 전용 계정 (root 실행 금지)
app_group: "appuser"
app_home: "/opt/{{ app_name }}"          # JAR 파일, 설정 파일 위치
app_log_dir: "/var/log/{{ app_name }}"   # 애플리케이션 로그 위치
app_pid_dir: "/var/run/{{ app_name }}"   # PID 파일 위치
app_config_dir: "/etc/{{ app_name }}"    # application.yml 등 설정 파일 위치

app_port: 8080             # 앱 HTTP 포트 (Nginx/HAProxy가 이 포트로 프록시)
app_management_port: 8081  # Spring Boot Actuator 포트 (헬스체크, 메트릭 용도)

# JAR 파일 다운로드 URL (S3, Nexus, Artifactory 등)
app_artifact_url: "https://your-artifact-repo.example.com/{{ app_name }}-{{ app_version }}.jar"
app_jar_path: "{{ app_home }}/{{ app_name }}.jar"

# -------------------------------------------------------
# [JVM 옵션 - 메모리 설정]
# -------------------------------------------------------
app_jvm_heap_min: "512m"
# -Xms: 초기 힙 메모리 크기
# Xms = Xmx로 동일하게 설정하면 GC가 힙 확장/축소를 안 해도 돼 성능 안정
# 너무 작으면 시작 직후부터 GC 빈발

app_jvm_heap_max: "1024m"
# -Xmx: 최대 힙 메모리 크기
# 서버 총 RAM의 50~70% 설정 권장
# 나머지는 OS, 메타스페이스, 스레드 스택, 네이티브 메모리 등이 사용

app_jvm_metaspace_max: "256m"
# -XX:MaxMetaspaceSize: 클래스 메타데이터 저장 공간 상한
# 설정 안 하면 무한정 증가 가능 → OOM Killer가 프로세스 죽임
# Spring Boot 대규모 앱은 128m~256m 정도 필요

# -------------------------------------------------------
# [JVM 옵션 - GC 설정]
# G1GC (Garbage First GC): Java 9+ 기본 GC
# 장점: 예측 가능한 정지 시간, 대용량 힙에서 효율적
# -------------------------------------------------------
app_jvm_gc_type: "G1GC"
# UseG1GC: 현재 주력 (Java 9~21)
# UseZGC: Java 15+, 초저지연 (응답시간 중요하면 선택)
# UseShenandoahGC: Red Hat 계열 배포판에서 지원

app_jvm_gc_max_pause: "200"
# -XX:MaxGCPauseMillis: GC가 목표로 하는 최대 정지 시간 (밀리초)
# G1GC는 이 값에 맞게 GC 영역 크기를 자동 조정
# API 서버는 200ms, 실시간 서비스는 50ms 이하 설정

app_jvm_gc_region_size: "16m"
# -XX:G1HeapRegionSize: G1GC 힙을 나누는 Region 크기
# 힙 크기에 따라 자동 설정되지만 명시적 지정이 성능에 유리
# 힙 1GB → 16MB, 힙 4GB → 32MB 정도 권장

# -------------------------------------------------------
# [JVM 옵션 - 로그 및 장애 분석]
# -------------------------------------------------------
app_jvm_gc_log_enabled: true
# GC 로그 활성화: GC가 언제 얼마나 자주, 얼마나 오래 실행되는지 기록
# 메모리 부족, 성능 저하 원인 분석의 핵심 데이터

app_jvm_heapdump_on_oom: true
# -XX:+HeapDumpOnOutOfMemoryError: OOM 발생 시 힙 덤프 자동 생성
# 힙 덤프 = 메모리에 무엇이 있었는지 스냅샷 (MAT, JProfiler로 분석 가능)
# 없으면 OOM 원인을 알 수 없어 재현이 매우 어려움

# -------------------------------------------------------
# [JVM 전체 옵션 (위 변수들을 조합)]
# -------------------------------------------------------
app_jvm_opts: >-
  -Xms{{ app_jvm_heap_min }}
  -Xmx{{ app_jvm_heap_max }}
  -XX:MaxMetaspaceSize={{ app_jvm_metaspace_max }}
  -XX:+Use{{ app_jvm_gc_type }}
  -XX:MaxGCPauseMillis={{ app_jvm_gc_max_pause }}
  -XX:G1HeapRegionSize={{ app_jvm_gc_region_size }}
  {% if app_jvm_gc_log_enabled %}
  -Xlog:gc*:file={{ app_log_dir }}/gc.log:time,uptime,level,tags:filecount=5,filesize=20m
  {% endif %}
  {% if app_jvm_heapdump_on_oom %}
  -XX:+HeapDumpOnOutOfMemoryError
  -XX:HeapDumpPath={{ app_log_dir }}/heap-dump.hprof
  {% endif %}
  -XX:+ExitOnOutOfMemoryError
  -XX:+CrashOnOutOfMemoryError
  -Djava.security.egd=file:/dev/./urandom
  -Dfile.encoding=UTF-8
  -Duser.timezone=Asia/Seoul

# -XX:+ExitOnOutOfMemoryError: OOM 발생 시 JVM 즉시 종료 (systemd가 재시작)
#   - 이게 없으면 OOM 후 좀비 상태로 응답 안 하는 프로세스가 됨
# -Dfile.encoding=UTF-8: 파일 읽기/쓰기 기본 인코딩 UTF-8 강제
# -Djava.security.egd=file:/dev/./urandom: 난수 생성기 urandom 사용
#   - /dev/random 사용 시 엔트로피 부족으로 세션 ID 생성이 수십 초 걸릴 수 있음

# -------------------------------------------------------
# [Spring Boot 설정]
# -------------------------------------------------------
app_spring_profile: "{{ environment }}"    # dev / staging / prod
app_db_host: "{{ hostvars[groups['dbservers'][0]]['ansible_host'] }}"
app_db_port: 3306
app_db_name: "appdb"
app_db_user: "appuser"
app_db_password: "{{ vault_db_app_password }}"

# -------------------------------------------------------
# [내장 Tomcat 설정 (Spring Boot)]
# Spring Boot는 별도 Tomcat 없이 내장 Tomcat으로 실행됨
# -------------------------------------------------------
app_tomcat_max_threads: 200
# 동시에 처리할 수 있는 최대 HTTP 요청 수 (스레드 수)
# CPU 코어 수 × 50~100 정도 설정 (I/O 집약적 작업은 더 높게)
# 너무 높으면 스레드 컨텍스트 스위칭 비용 증가

app_tomcat_min_spare_threads: 20
# 항상 대기 중인 최소 스레드 수 (요청 갑자기 올 때 즉시 처리 가능)

app_tomcat_accept_count: 100
# max_threads가 꽉 찼을 때 TCP 연결 대기 큐 크기
# accept_count 초과 시 "Connection refused" 발생
# OS의 somaxconn 보다 작아야 실제로 적용됨

app_tomcat_connection_timeout: 20000
# 클라이언트가 요청을 보내기 시작하는 데 허용하는 시간 (밀리초)
# 연결 후 20초 이내에 첫 바이트를 보내지 않으면 연결 종료

app_tomcat_compression: "on"
# Tomcat 레벨 gzip 압축 활성화
# Nginx가 앞에 있으면 보통 Nginx에서 압축, 여기서는 비활성 가능

# -------------------------------------------------------
# [HikariCP DB 커넥션 풀 설정]
# Spring Boot 기본 커넥션 풀
# -------------------------------------------------------
app_hikari_max_pool_size: 20
# DB 서버에 열어두는 최대 연결 수
# DB 서버의 max_connections 설정과 균형 필요
# 앱서버 3대 × 20개 = 60개 → DB max_connections > 60 이어야 함

app_hikari_min_idle: 5
# 항상 유지할 최소 유휴 연결 수 (요청 폭발 시 연결 생성 지연 방지)

app_hikari_connection_timeout: 30000
# 커넥션 풀에서 연결을 얻기까지 최대 대기 시간 (밀리초)
# 30초 이내에 연결 못 얻으면 SQLException 발생

app_hikari_idle_timeout: 600000
# 풀의 유휴 연결이 제거되는 시간 (밀리초, 10분)
# DB 서버의 wait_timeout(기본 8시간)보다 짧게 설정 권장

app_hikari_max_lifetime: 1800000
# 연결의 최대 생존 시간 (밀리초, 30분)
# DB 서버가 연결을 강제로 끊기 전에 풀이 먼저 교체

# -------------------------------------------------------
# [헬스체크]
# -------------------------------------------------------
app_health_check_url: "http://localhost:{{ app_management_port }}/actuator/health"
app_health_check_retries: 10     # 헬스체크 최대 시도 횟수
app_health_check_delay: 10       # 시도 사이 대기 시간 (초) - 총 최대 100초 대기
