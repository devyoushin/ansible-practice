# =============================================================
# MariaDB 서버 설정
# =============================================================
---
- name: MariaDB 설정 파일 배포 (my.cnf)
  template:
    src: my.cnf.j2
    dest: /etc/my.cnf
    owner: root
    group: root
    mode: "0644"
    backup: yes   # 기존 파일을 .날짜 형식으로 백업
  notify: restart mariadb

# ----------------------------
# firewalld 포트 허용
# ----------------------------
- name: firewalld MariaDB 포트 허용
  firewalld:
    port: "{{ mariadb_port }}/tcp"
    permanent: yes
    state: enabled
    immediate: yes

# ----------------------------
# 커널 파라미터 (DB 서버에 최적화)
# ----------------------------
- name: DB 서버용 sysctl 설정
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: yes
    reload: yes
  loop:
    - { key: "vm.swappiness", value: "1" }        # DB는 swap 최대한 안 쓰도록
    - { key: "vm.dirty_ratio", value: "15" }
    - { key: "vm.dirty_background_ratio", value: "5" }
    - { key: "net.core.somaxconn", value: "65535" }
