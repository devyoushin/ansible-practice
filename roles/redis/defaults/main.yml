---
# Redis 기본 설정
redis_version: "7.2"
redis_port: 6379
redis_bind: "127.0.0.1"
redis_password: "{{ vault_redis_password | default('') }}"

# 메모리 설정
redis_maxmemory: "256mb"
redis_maxmemory_policy: "allkeys-lru"  # volatile-lru, allkeys-lru, noeviction 등

# 영속성 설정
redis_save_enabled: true
redis_save_config:
  - "900 1"    # 900초 내 1건 변경 시 저장
  - "300 10"   # 300초 내 10건 변경 시 저장
  - "60 10000" # 60초 내 10000건 변경 시 저장
redis_appendonly: false  # AOF (append-only file) 활성화 여부
redis_appendfsync: "everysec"  # always, everysec, no

# 로그 설정
redis_loglevel: "notice"  # debug, verbose, notice, warning
redis_logfile: "/var/log/redis/redis-server.log"

# 연결 설정
redis_maxclients: 10000
redis_tcp_backlog: 511
redis_timeout: 0
redis_tcp_keepalive: 300

# 슬로우 쿼리 로그
redis_slowlog_log_slower_than: 10000  # 마이크로초 (10ms)
redis_slowlog_max_len: 128

# Redis Sentinel (HA) 설정
redis_sentinel_enabled: false
redis_sentinel_port: 26379
redis_sentinel_quorum: 2
redis_sentinel_master_name: "mymaster"
redis_sentinel_down_after_ms: 5000
redis_sentinel_failover_timeout: 60000
redis_sentinel_parallel_syncs: 1

# 데이터 디렉토리
redis_dir: "/var/lib/redis"
