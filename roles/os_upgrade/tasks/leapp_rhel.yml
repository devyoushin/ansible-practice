---
# leapp_rhel.yml — RHEL 공식 업그레이드 도구 leapp 사용
#
# leapp 업그레이드 프로세스:
#   1. leapp 패키지 설치
#   2. leapp preupgrade — 사전 점검 리포트 생성 (inhibitor 확인)
#   3. inhibitor 해결 (자동/수동)
#   4. leapp upgrade — 업그레이드 데이터 다운로드 + 재부팅 후 업그레이드 실행
#   5. 재부팅 완료 후 접속 재개

# ── leapp 설치 ────────────────────────────────────────────────────────────────

- name: leapp 패키지 설치
  dnf:
    name:
      - leapp-upgrade
    state: present
    enablerepo: "rhel-{{ ansible_distribution_major_version }}-for-x86_64-appstream-rpms"

# ── leapp preupgrade (사전 점검) ──────────────────────────────────────────────

- name: leapp preupgrade 실행 (업그레이드 가능 여부 사전 점검)
  command: leapp preupgrade --target {{ os_upgrade_target_version }}
  register: leapp_preupgrade
  changed_when: true
  failed_when: false    # inhibitor 있어도 리포트는 생성되므로 실패 무시

- name: leapp 사전 점검 리포트 읽기
  slurp:
    src: "{{ leapp_report_path }}"
  register: leapp_report_raw
  failed_when: false

- name: leapp 리포트 출력
  debug:
    msg: "{{ (leapp_report_raw.content | b64decode).split('\n')[:50] }}"
  when: leapp_report_raw.content is defined

# ── Inhibitor 처리 ────────────────────────────────────────────────────────────
# inhibitor: leapp이 업그레이드를 차단하는 문제 항목
# 가장 흔한 inhibitor와 자동 해결책을 제공

- name: inhibitor 존재 여부 확인
  shell: grep -c "Risk Factor: inhibitor" {{ leapp_report_path }} || echo 0
  register: inhibitor_count
  changed_when: false
  failed_when: false

- name: inhibitor 목록 출력 (운영자 확인 필요)
  shell: grep -A2 "Risk Factor: inhibitor" {{ leapp_report_path }} || echo "없음"
  register: inhibitor_list
  changed_when: false
  when: inhibitor_count.stdout | int > 0

- name: inhibitor 목록 표시
  debug:
    msg: "{{ inhibitor_list.stdout_lines }}"
  when: inhibitor_count.stdout | int > 0

# 흔한 inhibitor 자동 해결 ─────────────────────────────────────────────────────

- name: "[자동해결] pam_pkcs11 제거 (RHEL9에서 제거된 패키지)"
  dnf:
    name: pam_pkcs11
    state: absent
  failed_when: false

- name: "[자동해결] 지원 중단된 authconfig → authselect 마이그레이션"
  command: authselect select sssd --force
  failed_when: false
  changed_when: true

- name: "[자동해결] 사용 중단된 crypto-policy 설정 갱신"
  command: update-crypto-policies --set DEFAULT
  failed_when: false
  changed_when: true

- name: "[자동해결] 서드파티 저장소 비활성화 (업그레이드 중 충돌 방지)"
  shell: |
    for repo in $(dnf repolist --enabled | awk 'NR>1 {print $1}' | grep -Ev 'rhel|baseos|appstream|extras'); do
      dnf config-manager --disable "$repo" && echo "비활성화: $repo"
    done
  changed_when: true
  failed_when: false

- name: "[자동해결] UEFI secure boot 설정 확인 및 leapp 허용 목록 추가"
  command: >
    leapp answer --section check_vdo.confirm=True
  failed_when: false
  changed_when: true

# ── inhibitor 잔존 시 중단 ────────────────────────────────────────────────────

- name: leapp preupgrade 재실행 (inhibitor 해결 확인)
  command: leapp preupgrade --target {{ os_upgrade_target_version }}
  register: leapp_preupgrade_retry
  changed_when: true
  failed_when: false

- name: 남은 inhibitor 재확인
  shell: grep -c "Risk Factor: inhibitor" {{ leapp_report_path }} || echo 0
  register: inhibitor_count_after
  changed_when: false
  failed_when: false

- name: inhibitor 잔존 시 업그레이드 중단 (leapp_inhibitor_check=true 일 때)
  fail:
    msg: >
      Leapp inhibitor가 {{ inhibitor_count_after.stdout }}개 남아있습니다.
      {{ leapp_report_path }} 를 확인하여 수동으로 해결 후 재시도하세요.
      임시로 건너뛰려면: -e leapp_inhibitor_check=false (권장하지 않음)
  when:
    - inhibitor_count_after.stdout | int > 0
    - leapp_inhibitor_check | bool

# ── 실제 업그레이드 (dry_run 아닐 때만) ─────────────────────────────────────

- name: leapp upgrade 실행 (패키지 다운로드 + 재부팅 후 업그레이드 수행)
  command: leapp upgrade --target {{ os_upgrade_target_version }}
  register: leapp_upgrade_cmd
  changed_when: true
  async: 3600      # 최대 1시간 허용 (대용량 다운로드 시간 포함)
  poll: 30
  when: not (os_upgrade_dry_run | bool)

- name: "[DRY RUN] 실제 업그레이드는 건너뜁니다"
  debug:
    msg: "dry_run=true 이므로 leapp upgrade를 실행하지 않습니다."
  when: os_upgrade_dry_run | bool

# ── 재부팅 (leapp upgrade가 요청하는 재부팅) ─────────────────────────────────
# leapp upgrade 자체가 업그레이드 initrd를 만들고, 다음 재부팅 시 업그레이드 실행

- name: 업그레이드 재부팅 실행
  reboot:
    pre_reboot_delay: "{{ os_upgrade_pre_reboot_delay }}"
    reboot_timeout: "{{ os_upgrade_reboot_timeout }}"
    post_reboot_delay: 60
    msg: "Ansible OS 업그레이드 재부팅 (leapp)"
    test_command: "uname -r"
  when:
    - os_upgrade_auto_reboot | bool
    - not (os_upgrade_dry_run | bool)

- name: 업그레이드 후 OS 버전 확인
  command: cat /etc/os-release
  register: new_os_version
  changed_when: false
  when: not (os_upgrade_dry_run | bool)

- name: 업그레이드 결과 출력
  debug:
    msg: "{{ new_os_version.stdout_lines }}"
  when: not (os_upgrade_dry_run | bool)

- name: 업그레이드 버전 검증
  assert:
    that:
      - os_upgrade_target_version in new_os_version.stdout
    fail_msg: >
      OS 버전 업그레이드 확인 실패!
      목표: RHEL {{ os_upgrade_target_version }}
      현재: {{ new_os_version.stdout }}
      /var/log/leapp/leapp-upgrade.log 를 확인하세요.
    success_msg: "RHEL {{ os_upgrade_target_version }} 업그레이드 성공!"
  when: not (os_upgrade_dry_run | bool)
