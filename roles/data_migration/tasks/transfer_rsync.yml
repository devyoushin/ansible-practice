---
# ============================================================
# rsync 이관 - 증분 전송, 재시작 가능, 대역폭 제한 지원
# 권장 시나리오:
#   - 대용량 단일/다수 파일
#   - 네트워크 불안정 환경 (--partial 로 중단 시 이어받기)
#   - 재실행 안전 (변경된 파일만 전송)
# ============================================================

- name: "[rsync] 대상 서버에 목적지 디렉터리 생성"
  ansible.builtin.shell: >
    ssh -o StrictHostKeyChecking=no
    {{ migration_dst_user }}@{{ migration_dst_host }}
    "mkdir -p '{{ migration_dst_path }}'"
  changed_when: true
  tags: [migration, rsync]

- name: "[rsync] rsync 옵션 조립"
  ansible.builtin.set_fact:
    _rsync_opts: >-
      -avh
      --stats
      --progress
      {{ '--checksum' if rsync_checksum | bool else '' }}
      {{ '--delete' if rsync_delete | bool else '' }}
      {{ '-z' if rsync_compress | bool else '' }}
      {{ '--partial --partial-dir=.rsync_partial' if rsync_partial | bool else '' }}
      {{ '--bwlimit=' + rsync_bwlimit | string if rsync_bwlimit | int > 0 else '' }}
      {{ rsync_exclude_patterns | map('regex_replace', '^(.*)$', '--exclude="\1"') | join(' ') }}
      {{ rsync_extra_opts }}
  tags: [migration, rsync]

- name: "[rsync] 전송 실행 (재시도 {{ migration_retries }}회)"
  ansible.builtin.shell: >
    rsync {{ _rsync_opts }}
    -e "ssh -o StrictHostKeyChecking=no"
    "{{ migration_src_path }}/"
    "{{ migration_dst_user }}@{{ migration_dst_host }}:{{ migration_dst_path }}/"
    2>&1 | tee -a "{{ migration_log_dir }}/{{ migration_log_file }}"
  register: _rsync_result
  retries: "{{ migration_retries }}"
  delay: "{{ migration_retry_delay }}"
  until: _rsync_result.rc == 0
  changed_when: _rsync_result.rc == 0
  async: "{{ migration_timeout }}"
  poll: 30
  tags: [migration, rsync]

- name: "[rsync] 전송 통계 출력"
  ansible.builtin.debug:
    msg: "{{ _rsync_result.stdout_lines | select('match', '.*sent|received|total|speedup') | list }}"
  tags: [migration, rsync]
