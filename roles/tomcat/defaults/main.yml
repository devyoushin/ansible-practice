# =============================================================
# tomcat role 기본 변수 (WAR 파일 배포용 Tomcat)
#
# Spring Boot 내장 Tomcat과의 차이:
#   - 내장 Tomcat: 실행 가능한 JAR에 Tomcat이 포함 (앱과 함께 배포)
#   - 독립 Tomcat: Tomcat을 별도 설치하고 WAR 파일을 배포
#     사용 케이스: 하나의 Tomcat에 여러 앱(WAR)을 띄울 때,
#                레거시 프로젝트(Spring MVC, JSP 기반)
# =============================================================

---
# -------------------------------------------------------
# [Tomcat 기본 설정]
# -------------------------------------------------------
tomcat_version: "10.1.20"
# Tomcat 버전
# 9.x: Java 8+, Servlet 4.0, 현재 주력
# 10.x: Java 11+, Servlet 5.0 (Jakarta EE), 최신 표준
# 버전 선택 기준: Java 버전, 사용하는 라이브러리와 호환성 확인

tomcat_major_version: "10"
# 다운로드 URL 구성에 사용

tomcat_install_dir: "/opt/tomcat"          # Tomcat 설치 위치
tomcat_home: "{{ tomcat_install_dir }}/tomcat-{{ tomcat_version }}"
tomcat_symlink: "{{ tomcat_install_dir }}/current"
# current → tomcat-10.1.20 으로 심볼릭 링크
# 버전 업그레이드 시 심볼릭 링크만 변경하면 됨

tomcat_user: "tomcat"                      # Tomcat 실행 전용 계정
tomcat_group: "tomcat"

# -------------------------------------------------------
# [포트 설정]
# -------------------------------------------------------
tomcat_http_port: 8080           # HTTP 커넥터 포트 (Nginx가 프록시)
tomcat_https_port: 8443          # HTTPS 커넥터 (Nginx에서 SSL 처리하면 불필요)
tomcat_shutdown_port: 8005
# Tomcat을 원격으로 종료할 때 사용하는 포트
# 보안상 -1로 설정해 원격 종료 비활성화 권장 (systemctl stop 사용)
tomcat_ajp_enabled: false
# AJP: Apache HTTP Server와 Tomcat을 연결하는 프로토콜
# Nginx 사용 시 AJP 불필요 → 비활성화 (CVE-2020-1938 취약점 방지)

# -------------------------------------------------------
# [Java / JVM 설정]
# -------------------------------------------------------
tomcat_java_home: "/usr/lib/jvm/java-17-amazon-corretto"
# Tomcat이 사용할 JDK 경로 (setenv.sh의 JAVA_HOME)

tomcat_jvm_heap_min: "512m"
tomcat_jvm_heap_max: "2g"
tomcat_jvm_metaspace_max: "256m"
tomcat_jvm_gc_type: "G1GC"
tomcat_jvm_gc_max_pause: "200"

tomcat_catalina_opts: >-
  -Xms{{ tomcat_jvm_heap_min }}
  -Xmx{{ tomcat_jvm_heap_max }}
  -XX:MaxMetaspaceSize={{ tomcat_jvm_metaspace_max }}
  -XX:+Use{{ tomcat_jvm_gc_type }}
  -XX:MaxGCPauseMillis={{ tomcat_jvm_gc_max_pause }}
  -XX:+HeapDumpOnOutOfMemoryError
  -XX:HeapDumpPath={{ tomcat_home }}/logs/heap-dump.hprof
  -XX:+ExitOnOutOfMemoryError
  -Djava.security.egd=file:/dev/./urandom
  -Dfile.encoding=UTF-8
  -Duser.timezone=Asia/Seoul
# CATALINA_OPTS: Tomcat 전용 JVM 옵션 (JAVA_OPTS와 달리 Tomcat 프로세스에만 적용)

# -------------------------------------------------------
# [HTTP 커넥터 설정]
# 클라이언트(또는 Nginx)와의 HTTP 연결 처리
# -------------------------------------------------------
tomcat_max_threads: 200
# Tomcat이 동시에 처리할 수 있는 요청 수
# 이 값을 초과하면 acceptCount 큐에서 대기

tomcat_min_spare_threads: 25
# 항상 대기 중인 최소 스레드 (요청이 없어도 유지)

tomcat_accept_count: 100
# max_threads가 꽉 찼을 때 연결 대기 큐 크기
# 큐도 꽉 차면 "Connection refused" 발생

tomcat_connection_timeout: 20000
# 첫 번째 요청을 받기까지 허용하는 시간 (ms, 20초)
# 이 시간 안에 요청 안 오면 연결 종료 (idle 연결 정리)

tomcat_keep_alive_timeout: 20000
# keepalive 연결에서 다음 요청을 기다리는 시간 (ms, 20초)

tomcat_max_keep_alive_requests: 100
# keepalive 연결에서 처리할 최대 요청 수
# 이후 연결 종료하고 새 연결 수립 (무한정 점유 방지)

tomcat_compression: "on"
# HTTP 응답 gzip 압축 (text/* 타입 자동 압축)
# Nginx가 앞에 있으면 Nginx에서 압축하고 여기서는 off 가능

tomcat_compression_min_size: 2048
# 이 바이트 이상인 응답만 압축 (작은 응답은 압축 오버헤드가 이득보다 큼)

# -------------------------------------------------------
# [Executor (스레드 풀) 설정]
# Tomcat 커넥터들이 공유하는 스레드 풀
# -------------------------------------------------------
tomcat_executor_enabled: true
# true이면 커넥터별 스레드 대신 공유 Executor 사용 (리소스 효율)

tomcat_executor_name: "tomcatThreadPool"
tomcat_executor_max_threads: "{{ tomcat_max_threads }}"
tomcat_executor_min_spare_threads: "{{ tomcat_min_spare_threads }}"

# -------------------------------------------------------
# [WAR 배포 설정]
# -------------------------------------------------------
tomcat_app_name: "myapp"          # 앱 이름 (컨텍스트 경로가 됨)
tomcat_war_url: ""                # WAR 파일 다운로드 URL (Nexus, S3 등)
tomcat_war_version: "1.0.0"

tomcat_context_path: "/{{ tomcat_app_name }}"
# 앱의 URL 컨텍스트 경로
# /myapp 이면 http://서버/myapp/... 으로 접근
# ROOT.war로 배포하면 / (루트 경로)

tomcat_auto_deploy: false
# false: webapps/ 디렉토리에 WAR를 놓아도 자동 배포 안 함 (수동 관리)
# true: webapps/에 WAR 파일 복사하면 Tomcat이 자동 배포 (개발용)

# -------------------------------------------------------
# [로그 설정]
# -------------------------------------------------------
tomcat_log_dir: "/var/log/tomcat"
tomcat_access_log_pattern: "%h %l %u %t &quot;%r&quot; %s %b %D"
# %h = 클라이언트 IP, %l = 식별자, %u = 인증 사용자
# %t = 요청 시각, %r = 요청 라인, %s = 상태코드
# %b = 응답 바이트, %D = 처리 시간(ms) ← 슬로우 요청 분석에 중요

tomcat_log_rotate_days: "{{ log_retention_days | default(30) }}"
