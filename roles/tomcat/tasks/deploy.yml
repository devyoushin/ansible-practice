# =============================================================
# WAR 파일 배포 태스크
# 무중단 배포를 위해 블루/그린 방식으로 처리
# =============================================================

---
- name: WAR 파일 다운로드
  ansible.builtin.get_url:
    url: "{{ tomcat_war_url }}"
    dest: "/tmp/{{ tomcat_app_name }}-{{ tomcat_war_version }}.war"
    mode: '0644'

- name: 현재 배포된 WAR 백업
  ansible.builtin.copy:
    src: "{{ tomcat_home }}/webapps/{{ tomcat_app_name }}.war"
    dest: "{{ tomcat_home }}/webapps/{{ tomcat_app_name }}.war.bak"
    remote_src: yes
  ignore_errors: yes   # 첫 배포이거나 파일이 없으면 에러 무시

- name: WAR 파일 배포 (블록 - 실패 시 롤백)
  block:
    - name: 새 WAR 파일을 webapps에 복사
      ansible.builtin.copy:
        src: "/tmp/{{ tomcat_app_name }}-{{ tomcat_war_version }}.war"
        dest: "{{ tomcat_home }}/webapps/{{ tomcat_app_name }}.war"
        remote_src: yes
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
        mode: '0644'
      notify: restart tomcat

    - name: Tomcat 재시작 강제 실행 (핸들러 즉시 적용)
      ansible.builtin.meta: flush_handlers
      # 핸들러를 play 끝까지 기다리지 않고 즉시 실행
      # 재시작해야 새 WAR가 배포됨

    - name: 앱 배포 후 헬스체크
      ansible.builtin.uri:
        url: "http://localhost:{{ tomcat_http_port }}{{ tomcat_context_path }}/health"
        method: GET
        status_code: 200
        return_content: yes
      register: health_result
      until: health_result.status == 200
      retries: 12
      delay: 10
      # 최대 2분(12회 × 10초) 동안 헬스체크 재시도

  rescue:
    # 배포 또는 헬스체크 실패 시 이전 버전으로 롤백
    - name: 배포 실패 - 이전 WAR 파일로 롤백
      ansible.builtin.copy:
        src: "{{ tomcat_home }}/webapps/{{ tomcat_app_name }}.war.bak"
        dest: "{{ tomcat_home }}/webapps/{{ tomcat_app_name }}.war"
        remote_src: yes
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
      ignore_errors: yes

    - name: Tomcat 재시작 (롤백 적용)
      ansible.builtin.service:
        name: tomcat
        state: restarted

    - name: 롤백 실패 알림 (에러 발생)
      ansible.builtin.fail:
        msg: |
          ❌ 배포 실패 및 롤백 완료
          WAR: {{ tomcat_app_name }}-{{ tomcat_war_version }}.war
          서버: {{ inventory_hostname }}
          이전 버전으로 복구되었습니다.
          배포 로그를 확인하세요: journalctl -u tomcat --since "5 minutes ago"
