# =============================================================
# tomcat role 진입점
# 실행 순서: install → configure → deploy
# =============================================================

---
- name: Tomcat 설치
  import_tasks: install.yml
  tags: [tomcat, install]

- name: Tomcat 설정 배포
  import_tasks: configure.yml
  tags: [tomcat, configure]

- name: WAR 파일 배포
  import_tasks: deploy.yml
  tags: [tomcat, deploy]
  when: tomcat_war_url != ""
  # WAR URL이 설정된 경우에만 배포 실행
