# =============================================================
# Tomcat 설정 파일 배포 태스크
# =============================================================

---
# -------------------------------------------------------
# 1. 핵심 설정 파일 배포
# -------------------------------------------------------
- name: server.xml 배포 (커넥터, 엔진, 호스트 설정)
  ansible.builtin.template:
    src: server.xml.j2
    dest: "{{ tomcat_home }}/conf/server.xml"
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    mode: '0640'             # 소유자만 읽기/쓰기 (DB 접속 정보 등 민감 정보 보호)
    validate: "{{ tomcat_home }}/bin/catalina.sh configtest"
    # 배포 전 Tomcat XML 문법 검사 (validate가 0을 반환하면 배포)
  notify: restart tomcat
  # server.xml 변경 시 Tomcat 재시작 필요

- name: setenv.sh 배포 (JVM 옵션, 환경 변수)
  ansible.builtin.template:
    src: setenv.sh.j2
    dest: "{{ tomcat_home }}/bin/setenv.sh"
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    mode: '0750'             # 실행 권한 필요
  notify: restart tomcat

- name: context.xml 배포 (앱 공통 설정, 세션 영속성)
  ansible.builtin.template:
    src: context.xml.j2
    dest: "{{ tomcat_home }}/conf/context.xml"
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    mode: '0640'
  notify: restart tomcat

# -------------------------------------------------------
# 2. 불필요한 기본 앱 제거 (보안)
# -------------------------------------------------------
- name: Tomcat 기본 예제 앱 제거
  ansible.builtin.file:
    path: "{{ tomcat_home }}/webapps/{{ item }}"
    state: absent
  loop:
    - examples       # Servlet/JSP 예제 (정보 노출, 보안 취약)
    - docs           # Tomcat 문서 (외부 접근 불필요)
    - ROOT           # Tomcat 기본 홈 페이지 (버전 정보 노출)
    - host-manager   # 가상 호스트 관리 UI (사용 안 하면 제거)
    - manager        # Tomcat Manager (WAR 배포 UI - 보안 위험)
  # manager 앱은 기본 비밀번호로 인한 취약점 사례가 많음
  # 필요하면 강력한 비밀번호 설정 후 남겨둘 것

# -------------------------------------------------------
# 3. systemd 서비스 등록
# -------------------------------------------------------
- name: Tomcat systemd 서비스 파일 생성
  ansible.builtin.template:
    src: tomcat.service.j2
    dest: /etc/systemd/system/tomcat.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd daemon
    - restart tomcat

- name: Tomcat 서비스 시작 및 부팅 자동 시작 등록
  ansible.builtin.service:
    name: tomcat
    state: started
    enabled: yes

# -------------------------------------------------------
# 4. 로그 로테이션 설정
# -------------------------------------------------------
- name: Tomcat 로그 로테이션 설정 배포
  ansible.builtin.template:
    src: tomcat-logrotate.j2
    dest: /etc/logrotate.d/tomcat
    owner: root
    group: root
    mode: '0644'

# -------------------------------------------------------
# 5. 헬스체크 - 기동 확인
# -------------------------------------------------------
- name: Tomcat 정상 기동 확인
  ansible.builtin.uri:
    url: "http://localhost:{{ tomcat_http_port }}/"
    method: GET
    status_code: [200, 302, 404]
    # 200: 앱이 있을 때, 302: 리다이렉트, 404: ROOT 제거 후 정상 응답
  register: tomcat_check
  until: tomcat_check.status in [200, 302, 404]
  retries: 10
  delay: 5
  # 최대 50초(10회 × 5초) 동안 기동 대기
