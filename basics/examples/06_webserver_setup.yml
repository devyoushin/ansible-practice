---
# ================================================================
# 예제 06: 실전 웹서버 구성 (Nginx + 가상호스트 + 방화벽)
# ================================================================
# 이 예제는 여러 개념을 종합한 실전형 플레이북입니다.
# - 패키지 설치
# - 설정 파일 배포 (template)
# - 서비스 관리 + 핸들러
# - 방화벽 설정
# - 헬스체크
#
# 실행 방법:
#   ansible-playbook -i hosts_example.ini 06_웹서버_구성.yml
# ================================================================

- name: Nginx 웹서버 구성
  hosts: webservers
  become: true

  vars:
    nginx_port: 80
    nginx_worker_processes: auto
    nginx_keepalive_timeout: 65

    # 가상 호스트 목록
    vhosts:
      - server_name: myapp.example.com
        root: /var/www/myapp
        index: index.html

      - server_name: api.example.com
        root: /var/www/api
        proxy_pass: http://127.0.0.1:8080   # Spring Boot 프록시

    # 방화벽 허용 포트
    firewall_ports:
      - { port: "80/tcp",  comment: "HTTP" }
      - { port: "443/tcp", comment: "HTTPS" }

  handlers:
    - name: Nginx 재시작
      service:
        name: nginx
        state: restarted

    - name: Nginx 설정 리로드
      service:
        name: nginx
        state: reloaded

    - name: firewalld 리로드
      service:
        name: firewalld
        state: reloaded

  tasks:

    # ── 1단계: 패키지 설치 ──────────────────────────────────────
    - name: Nginx 설치
      dnf:
        name:
          - nginx
          - firewalld
        state: present
      tags: [install]

    # ── 2단계: 웹 루트 디렉토리 생성 ────────────────────────────
    - name: 웹 루트 디렉토리 생성
      file:
        path: "{{ item.root }}"
        state: directory
        owner: nginx
        group: nginx
        mode: "0755"
      loop: "{{ vhosts }}"
      loop_control:
        label: "{{ item.server_name }}"
      tags: [config]

    # ── 3단계: 기본 index.html 생성 ─────────────────────────────
    - name: 기본 index.html 생성
      copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>{{ item.server_name }}</title></head>
          <body>
            <h1>{{ item.server_name }}</h1>
            <p>서버: {{ inventory_hostname }} | 날짜: {{ ansible_date_time.date }}</p>
          </body>
          </html>
        dest: "{{ item.root }}/index.html"
        owner: nginx
        group: nginx
        mode: "0644"
      loop: "{{ vhosts }}"
      loop_control:
        label: "{{ item.server_name }}"
      when: item.proxy_pass is not defined   # 프록시 설정이면 생략
      tags: [config]

    # ── 4단계: nginx.conf 메인 설정 ─────────────────────────────
    - name: nginx.conf 배포
      copy:
        content: |
          user nginx;
          worker_processes {{ nginx_worker_processes }};
          error_log /var/log/nginx/error.log warn;
          pid /run/nginx.pid;

          events {
              worker_connections 1024;
          }

          http {
              include       /etc/nginx/mime.types;
              default_type  application/octet-stream;
              keepalive_timeout {{ nginx_keepalive_timeout }};
              server_tokens off;
              gzip on;
              include /etc/nginx/conf.d/*.conf;
          }
        dest: /etc/nginx/nginx.conf
        mode: "0644"
        backup: true
      notify: Nginx 설정 리로드
      tags: [config]

    # ── 5단계: 가상호스트 설정 파일 생성 ────────────────────────
    - name: 가상호스트 설정 생성
      copy:
        content: |
          server {
              listen {{ nginx_port }};
              server_name {{ item.server_name }};

          {% if item.proxy_pass is defined %}
              location / {
                  proxy_pass         {{ item.proxy_pass }};
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_connect_timeout 30;
                  proxy_read_timeout    60;
              }
          {% else %}
              root   {{ item.root }};
              index  {{ item.index | default('index.html') }};

              location / {
                  try_files $uri $uri/ =404;
              }
          {% endif %}

              location /health {
                  return 200 "OK";
                  add_header Content-Type text/plain;
              }

              access_log /var/log/nginx/{{ item.server_name }}_access.log;
              error_log  /var/log/nginx/{{ item.server_name }}_error.log;
          }
        dest: "/etc/nginx/conf.d/{{ item.server_name }}.conf"
        mode: "0644"
      loop: "{{ vhosts }}"
      loop_control:
        label: "{{ item.server_name }}"
      notify: Nginx 설정 리로드
      tags: [config]

    # ── 6단계: Nginx 설정 문법 검사 ─────────────────────────────
    - name: Nginx 설정 문법 검사
      command: nginx -t
      changed_when: false
      tags: [verify]

    # ── 7단계: 서비스 시작 ──────────────────────────────────────
    - name: Nginx 시작
      service:
        name: nginx
        state: started
        enabled: true
      tags: [service]

    - name: firewalld 시작
      service:
        name: firewalld
        state: started
        enabled: true
      tags: [firewall]

    # ── 8단계: 방화벽 포트 개방 ─────────────────────────────────
    - name: 방화벽 포트 허용
      firewalld:
        port: "{{ item.port }}"
        permanent: true
        immediate: true    # 즉시 적용
        state: enabled
      loop: "{{ firewall_ports }}"
      loop_control:
        label: "{{ item.comment }}"
      notify: firewalld 리로드
      tags: [firewall]

    # ── 9단계: 헬스체크 ─────────────────────────────────────────
    - name: Nginx 응답 확인
      uri:
        url: "http://{{ ansible_default_ipv4.address | default('127.0.0.1') }}/health"
        method: GET
        status_code: 200
        timeout: 10
      register: health_check
      until: health_check.status == 200
      retries: 5
      delay: 3
      failed_when: false
      tags: [verify]

    - name: 헬스체크 결과 출력
      debug:
        msg: "{{ inventory_hostname }}: {{ '정상 (200)' if health_check.status == 200 else '응답 없음 — 확인 필요' }}"
      tags: [verify]

    # ── 10단계: 최종 상태 요약 ──────────────────────────────────
    - name: 구성 완료 요약
      debug:
        msg:
          - "==============================="
          - "Nginx 구성 완료: {{ inventory_hostname }}"
          - "==============================="
          - "가상호스트:"
          - "{% for v in vhosts %}"
          - "  - {{ v.server_name }} (포트 {{ nginx_port }})"
          - "{% endfor %}"
          - "방화벽: {{ firewall_ports | map(attribute='port') | list | join(', ') }}"
          - "==============================="
      tags: [summary]
