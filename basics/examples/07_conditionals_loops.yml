---
# ================================================================
# 예제 07: 조건문(when)과 반복문(loop) 실전 패턴 모음
# ================================================================
# 실행 방법:
#   ansible-playbook -i hosts_example.ini 07_조건문_반복문.yml -c local
# ================================================================

- name: 조건문과 반복문 패턴 예제
  hosts: localhost
  gather_facts: true
  connection: local   # 로컬에서 실행 (서버 없이 테스트)

  vars:
    env: dev
    app_version: "2.1.0"
    os_type: "{{ ansible_os_family }}"

    # 서버 목록 (딕셔너리 리스트)
    servers:
      - name: web1
        ip: 192.168.1.10
        role: webserver
        active: true
      - name: web2
        ip: 192.168.1.11
        role: webserver
        active: false     # 비활성 서버
      - name: db1
        ip: 192.168.1.20
        role: database
        active: true

    # 환경별 설정
    env_config:
      dev:
        replicas: 1
        log_level: DEBUG
        debug_mode: true
      staging:
        replicas: 2
        log_level: INFO
        debug_mode: false
      prod:
        replicas: 3
        log_level: WARN
        debug_mode: false

  tasks:

    # ══════════════════════════════════════════════════
    # 조건문 패턴
    # ══════════════════════════════════════════════════

    - name: "[when] 기본 — 환경별 분기"
      debug:
        msg: "{{ env }} 환경 실행 중"
      when: env in ['dev', 'staging', 'prod']

    - name: "[when] AND 조건 — 운영환경 + 버전 체크"
      debug:
        msg: "운영 배포: v{{ app_version }}"
      when:
        - env == "prod"
        - app_version is version('2.0.0', '>=')   # 버전 비교

    - name: "[when] OR 조건 — 개발/스테이징"
      debug:
        msg: "비운영 환경 — 디버그 모드"
      when: env == "dev" or env == "staging"

    - name: "[when] 변수 정의 여부"
      debug:
        msg: "버전 정보: {{ app_version }}"
      when: app_version is defined

    - name: "[when] 리스트에 값 포함 여부"
      debug:
        msg: "RedHat 계열 OS"
      when: ansible_distribution in ['RedHat', 'Rocky', 'CentOS', 'AlmaLinux']

    - name: "[when] register 결과로 분기"
      command: echo "hello"
      register: echo_result
      changed_when: false

    - name: "[when] 이전 명령 성공 시만"
      debug:
        msg: "명령 성공: {{ echo_result.stdout }}"
      when: echo_result.rc == 0

    # ══════════════════════════════════════════════════
    # 반복문 패턴
    # ══════════════════════════════════════════════════

    - name: "[loop] 기본 — 리스트 반복"
      debug:
        msg: "항목: {{ item }}"
      loop:
        - apple
        - banana
        - cherry

    - name: "[loop] 딕셔너리 — 이름과 값"
      debug:
        msg: "{{ item.name }}: {{ item.ip }} (활성: {{ item.active }})"
      loop: "{{ servers }}"
      loop_control:
        label: "{{ item.name }}"   # 로그 간결하게

    - name: "[loop + when] 활성 서버만 처리"
      debug:
        msg: "활성 서버: {{ item.name }} ({{ item.ip }})"
      loop: "{{ servers }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.active    # active: true 인 것만

    - name: "[loop] 웹서버 역할만 필터"
      debug:
        msg: "웹서버: {{ item.name }}"
      loop: "{{ servers | selectattr('role', 'eq', 'webserver') | list }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "[loop] 인덱스 번호와 함께"
      debug:
        msg: "{{ idx + 1 }}번째: {{ item }}"
      loop: ['서울', '부산', '대구']
      loop_control:
        index_var: idx    # 0부터 시작하는 인덱스

    # ══════════════════════════════════════════════════
    # 실전 패턴: 딕셔너리 변수에서 환경 설정 읽기
    # ══════════════════════════════════════════════════

    - name: "[실전] 현재 환경 설정 읽기"
      set_fact:
        current_config: "{{ env_config[env] }}"

    - name: "[실전] 환경 설정 적용"
      debug:
        msg:
          - "환경: {{ env }}"
          - "복제 수: {{ current_config.replicas }}"
          - "로그 레벨: {{ current_config.log_level }}"
          - "디버그: {{ current_config.debug_mode }}"

    # ══════════════════════════════════════════════════
    # 실전 패턴: 반복 + 조건 + register
    # ══════════════════════════════════════════════════

    - name: "[실전] 여러 URL 상태 확인"
      uri:
        url: "http://{{ item }}"
        timeout: 5
        status_code: [200, 301, 302, 404]   # 응답 오면 성공으로 처리
      loop:
        - google.com
        - example.com
      register: url_results
      failed_when: false
      loop_control:
        label: "{{ item }}"

    - name: "[실전] URL 결과 요약"
      debug:
        msg: "{{ item.item }}: {{ item.status | default('연결실패') }}"
      loop: "{{ url_results.results }}"
      loop_control:
        label: "{{ item.item }}"

    # ══════════════════════════════════════════════════
    # until — 성공할 때까지 재시도
    # ══════════════════════════════════════════════════

    - name: "[until] 서비스 응답 대기"
      command: echo "서비스 준비됨"  # 실제로는 curl http://localhost:8080/health
      register: svc_check
      until: svc_check.rc == 0     # 성공할 때까지
      retries: 5                    # 최대 5번
      delay: 2                      # 2초 간격
      changed_when: false
