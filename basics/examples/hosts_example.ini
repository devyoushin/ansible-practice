# ================================================================
# 인벤토리 예제 파일
# 실제 사용 시 IP와 사용자 정보를 본인 환경에 맞게 수정하세요.
# ================================================================

# ── 웹서버 그룹 ──────────────────────────────────────────────────
[webservers]
web1 ansible_host=192.168.1.10
web2 ansible_host=192.168.1.11

[webservers:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/my-key.pem
ansible_become=true

# ── 앱서버 그룹 ──────────────────────────────────────────────────
[appservers]
app1 ansible_host=192.168.1.30

[appservers:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/my-key.pem
ansible_become=true

# ── DB 서버 그룹 ─────────────────────────────────────────────────
[dbservers]
db1 ansible_host=192.168.1.20

[dbservers:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/my-key.pem
ansible_become=true

# ── 전체를 묶는 상위 그룹 ────────────────────────────────────────
[all_servers:children]
webservers
appservers
dbservers

# ── 로컬호스트 테스트용 (실제 SSH 없이 테스트) ───────────────────
[local]
localhost ansible_connection=local
