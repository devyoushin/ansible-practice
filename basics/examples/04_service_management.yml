---
# ================================================================
# 예제 04: 서비스 시작/중지/재시작 + 상태 확인
# ================================================================
# 실행 방법:
#   ansible-playbook -i hosts_example.ini 04_서비스_관리.yml
#
# 특정 서비스만:
#   ansible-playbook -i hosts_example.ini 04_서비스_관리.yml --tags nginx
# ================================================================

- name: 서비스 관리 예제
  hosts: all
  become: true

  vars:
    services_to_start:
      - nginx
      - firewalld

    services_to_disable:
      - postfix      # 불필요한 경우 비활성화
      - cups

  tasks:

    # ── 단순 시작/중지/재시작 ────────────────────────────────────
    - name: Nginx 설치
      dnf:
        name: nginx
        state: present
      when: ansible_os_family == "RedHat"
      tags: [nginx]

    - name: Nginx 시작 및 부팅 시 자동 시작 등록
      service:
        name: nginx
        state: started     # started: 중지 상태면 시작, 이미 실행 중이면 그냥 둠
        enabled: true      # 부팅 시 자동 시작
      tags: [nginx]

    # ── 설정 변경 후 reload (재시작 없이 설정만 다시 읽음) ──────
    - name: Nginx 설정 파일 배포
      copy:
        content: |
          # 기본 nginx.conf (예시)
          worker_processes auto;
          events { worker_connections 1024; }
          http { include /etc/nginx/conf.d/*.conf; }
        dest: /etc/nginx/nginx.conf
        mode: "0644"
      notify: Nginx 설정 재로드   # 변경되면 핸들러 실행
      tags: [nginx]

    # ── 서비스 상태 확인 ─────────────────────────────────────────
    - name: Nginx 상태 확인
      command: systemctl is-active nginx
      register: nginx_status
      changed_when: false   # 조회 목적이므로 changed 표시 안 함
      failed_when: false    # inactive 여도 오류 아님
      tags: [nginx, check]

    - name: Nginx 상태 출력
      debug:
        msg: "Nginx 상태: {{ nginx_status.stdout }}"
      tags: [nginx, check]

    # ── 서비스 상태 검증 ─────────────────────────────────────────
    - name: Nginx 정상 동작 확인
      service_facts:   # 모든 서비스 상태를 ansible_facts.services 에 저장
      tags: [check]

    - name: Nginx 실행 중인지 검증
      assert:
        that:
          - ansible_facts.services['nginx.service']['state'] == 'running'
        success_msg: "Nginx 정상 실행 중"
        fail_msg: "Nginx가 실행되지 않고 있습니다!"
      tags: [check]

    # ── 여러 서비스 한번에 시작 ──────────────────────────────────
    - name: 서비스 목록 시작
      service:
        name: "{{ item }}"
        state: started
        enabled: true
      loop: "{{ services_to_start }}"
      failed_when: false   # 설치 안 된 서비스는 건너뜀
      tags: [multi]

    # ── 불필요한 서비스 비활성화 ─────────────────────────────────
    - name: 불필요한 서비스 비활성화
      service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop: "{{ services_to_disable }}"
      failed_when: false   # 없는 서비스는 무시
      tags: [disable]

    # ── 포트 열림 확인 (Nginx 80 포트) ──────────────────────────
    - name: 포트 응답 확인
      wait_for:
        host: localhost
        port: 80
        timeout: 30       # 최대 30초 대기
        state: started    # 포트가 열릴 때까지 대기
      failed_when: false
      tags: [nginx, check]

    # ── 실행 중인 서비스 목록 출력 ──────────────────────────────
    - name: 현재 실행 중인 서비스 확인
      shell: systemctl list-units --type=service --state=running --no-legend | awk '{print $1}'
      register: running_services
      changed_when: false
      tags: [check]

    - name: 실행 중인 서비스 출력
      debug:
        msg: "실행 중: {{ running_services.stdout_lines }}"
      tags: [check]

  # ── 핸들러 ───────────────────────────────────────────────────
  handlers:
    - name: Nginx 설정 재로드
      service:
        name: nginx
        state: reloaded

    - name: Nginx 재시작
      service:
        name: nginx
        state: restarted
