---
# ================================================================
# 예제 03: 파일 및 디렉토리 관리
# ================================================================
# 실행 방법:
#   ansible-playbook -i hosts_example.ini 03_파일_배포.yml
# ================================================================

- name: 파일/디렉토리 관리 예제
  hosts: all
  become: true

  vars:
    app_name: myapp
    app_user: myapp
    app_dirs:
      - { path: "/opt/{{ app_name }}",         mode: "0755" }
      - { path: "/opt/{{ app_name }}/logs",     mode: "0750" }
      - { path: "/opt/{{ app_name }}/conf",     mode: "0750" }
      - { path: "/opt/{{ app_name }}/data",     mode: "0750" }

  tasks:

    # ── 사용자 생성 ──────────────────────────────────────────────
    - name: 앱 전용 사용자 생성
      user:
        name: "{{ app_user }}"
        shell: /sbin/nologin   # 로그인 불가 (보안)
        create_home: false
        system: true           # 시스템 계정

    # ── 디렉토리 생성 ────────────────────────────────────────────
    - name: 앱 디렉토리 일괄 생성
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "{{ item.mode }}"
      loop: "{{ app_dirs }}"

    # ── 파일 직접 작성 ───────────────────────────────────────────
    - name: 설정 파일 생성
      copy:
        content: |
          # {{ app_name }} 설정 파일
          # 생성일: {{ ansible_date_time.date }}
          # 서버: {{ inventory_hostname }}

          [server]
          host = {{ ansible_default_ipv4.address | default('127.0.0.1') }}
          port = 8080

          [logging]
          level = INFO
          path  = /opt/{{ app_name }}/logs/app.log
        dest: "/opt/{{ app_name }}/conf/app.conf"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"

    # ── 파일 한 줄 추가/수정 ─────────────────────────────────────
    - name: /etc/hosts에 서버 항목 추가
      lineinfile:
        path: /etc/hosts
        line: "{{ ansible_default_ipv4.address | default('127.0.0.1') }}  {{ inventory_hostname }}.internal  {{ inventory_hostname }}"
        state: present

    # ── 특정 줄 내용 교체 (정규식) ─────────────────────────────
    - name: SSH 루트 로그인 비활성화
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        backup: true    # 변경 전 백업 파일 생성

    # ── 블록 단위로 내용 추가 ────────────────────────────────────
    - name: /etc/hosts에 내부 서버 블록 추가
      blockinfile:
        path: /etc/hosts
        block: |
          # 내부 서버 목록
          192.168.1.10  web1.internal
          192.168.1.11  web2.internal
          192.168.1.20  db1.internal
        marker: "# {mark} ANSIBLE MANAGED BLOCK"  # 구분 주석 (자동 추가/제거 가능)

    # ── 파일 권한 변경 ───────────────────────────────────────────
    - name: 로그 디렉토리 권한 재설정
      file:
        path: "/opt/{{ app_name }}/logs"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"
        recurse: true    # 하위 파일 포함

    # ── 심볼릭 링크 ─────────────────────────────────────────────
    - name: 설정 파일 심볼릭 링크 생성
      file:
        src: "/opt/{{ app_name }}/conf/app.conf"
        dest: /etc/myapp.conf
        state: link

    # ── 파일 존재 여부 확인 ─────────────────────────────────────
    - name: 설정 파일 존재 확인
      stat:
        path: "/opt/{{ app_name }}/conf/app.conf"
      register: config_file

    - name: 결과 출력
      debug:
        msg:
          - "파일 존재: {{ config_file.stat.exists }}"
          - "파일 크기: {{ config_file.stat.size }}바이트"
          - "소유자: {{ config_file.stat.pw_name }}"
      when: config_file.stat.exists

    # ── 파일 삭제 ────────────────────────────────────────────────
    - name: 임시 파일 삭제 (있으면)
      file:
        path: /tmp/old_config.bak
        state: absent    # 없어도 오류 발생 안 함
