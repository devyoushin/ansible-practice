# =============================================================
# Ansible 기본 설정 파일
# Terraform의 provider.tf / backend.tf 역할과 유사
# =============================================================

[defaults]
# 인벤토리 기본 경로
inventory           = ./inventories/dev/hosts.ini

# 롤 경로
roles_path          = ./roles

# 커스텀 필터 플러그인 경로
filter_plugins      = ./filter_plugins

# SSH 관련 설정
remote_user         = ec2-user
private_key_file    = ~/.ssh/id_rsa
host_key_checking   = False

# 출력 포맷
stdout_callback     = yaml
bin_ansible_callbacks = True

# 병렬 실행 수
forks               = 10

# 로그 파일 경로
log_path            = ./logs/ansible.log

# 재시도 파일 생성 비활성화
retry_files_enabled = False

# ----------------------------
# Ansible Vault 비밀번호 파일
# 파일 내용: 비밀번호 한 줄
# 생성: echo "your-vault-password" > ~/.vault_pass && chmod 600 ~/.vault_pass
# ----------------------------
vault_password_file = ~/.vault_pass

# ----------------------------
# 콜백 플러그인 (실행 결과 포맷)
# profile_tasks: 각 태스크 실행 시간 측정
# timer: 전체 실행 시간 출력
# ----------------------------
# callback_whitelist = profile_tasks, timer

# Python 인터프리터 자동 감지 (경고 메시지 제거)
interpreter_python  = auto_silent

[ssh_connection]
# SSH 파이프라인 활성화 (성능 향상)
pipelining          = True
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s

[privilege_escalation]
become              = True
become_method       = sudo
become_user         = root
become_ask_pass     = False
