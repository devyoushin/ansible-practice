# =============================================================
# 스테이징(staging) 환경 인벤토리
# =============================================================

[webservers]
stg-web-01 ansible_host=10.30.1.10
stg-web-02 ansible_host=10.30.1.11

[appservers]
stg-app-01 ansible_host=10.30.2.10
stg-app-02 ansible_host=10.30.2.11

[dbservers]
stg-db-01 ansible_host=10.30.3.10

[loadbalancers]
stg-lb-01 ansible_host=10.30.0.10

[monitoring]
stg-mon-01 ansible_host=10.30.4.10

[staging:children]
webservers
appservers
dbservers
loadbalancers
monitoring

[staging:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/staging-key.pem
env=staging
