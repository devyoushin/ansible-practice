# =============================================================
# 개발(dev) 환경 공통 변수
# =============================================================

---
project: "ansible-practice"
environment: "dev"
owner: "sunny"
managed_by: "ansible"

aws_region: "ap-northeast-2"
vpc_cidr: "10.20.0.0/16"

ntp_servers:
  - "169.254.169.123"
  - "time.google.com"

timezone: "Asia/Seoul"

# dev는 디버깅 도구 포함 (telnet 등 추가)
common_packages:
  - vim
  - curl
  - wget
  - unzip
  - git
  - htop
  - net-tools
  - telnet        # 포트 연결 테스트 (prod에서는 보안상 제외)
  - lsof
  - sysstat

ssh_port: 22
ssh_allow_users: "ec2-user"
ssh_password_authentication: "no"
ssh_permit_root_login: "no"
ssh_max_auth_tries: 5           # dev는 좀 더 여유 있게
ssh_client_alive_interval: 600
ssh_client_alive_count_max: 3

log_retention_days: 30          # dev는 30일만 보관

disable_thp: true               # dev도 THP 비활성화 (Redis 등 테스트 환경)

# dev sysctl은 기본값(common defaults) + 최소한만 설정
sysctl_settings:
  - name: "net.core.somaxconn"
    value: "65535"
  - name: "net.ipv4.tcp_max_syn_backlog"
    value: "65535"
  - name: "fs.file-max"
    value: "65536"
  - name: "vm.swappiness"
    value: "10"
  - name: "kernel.pid_max"
    value: "65536"
