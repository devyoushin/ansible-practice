# =============================================================
# 개발(dev) 환경 인벤토리
# terraform-ec2의 envs/dev/terraform.tfvars 역할과 유사
# =============================================================

# ----------------------------
# 웹서버 그룹
# ----------------------------
[webservers]
dev-web-01 ansible_host=10.20.1.10
dev-web-02 ansible_host=10.20.1.11

# ----------------------------
# 애플리케이션 서버 그룹
# ----------------------------
[appservers]
dev-app-01 ansible_host=10.20.2.10

# ----------------------------
# 데이터베이스 서버 그룹
# ----------------------------
[dbservers]
dev-db-01 ansible_host=10.20.3.10

# ----------------------------
# 로드밸런서 그룹 (HAProxy)
# ----------------------------
[loadbalancers]
dev-lb-01 ansible_host=10.20.0.10

# ----------------------------
# 모니터링 서버 그룹 (Prometheus)
# ----------------------------
[monitoring]
dev-mon-01 ansible_host=10.20.4.10

# ----------------------------
# 전체 서버 그룹 (상속)
# ----------------------------
[dev:children]
webservers
appservers
dbservers
loadbalancers
monitoring

# ----------------------------
# 전체 그룹 공통 변수
# ----------------------------
[dev:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/dev-key.pem
env=dev
