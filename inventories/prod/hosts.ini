# =============================================================
# 프로덕션(prod) 환경 인벤토리
# terraform-ec2의 envs/prod/ 와 동일한 역할
# =============================================================

[webservers]
prod-web-01 ansible_host=10.0.1.10
prod-web-02 ansible_host=10.0.1.11
prod-web-03 ansible_host=10.0.1.12

[appservers]
prod-app-01 ansible_host=10.0.2.10
prod-app-02 ansible_host=10.0.2.11
prod-app-03 ansible_host=10.0.2.12

[dbservers]
prod-db-01 ansible_host=10.0.3.10
prod-db-02 ansible_host=10.0.3.11  # 읽기 전용 레플리카

[prod:children]
webservers
appservers
dbservers

[prod:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/prod-key.pem
env=prod
