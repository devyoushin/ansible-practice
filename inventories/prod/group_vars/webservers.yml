# =============================================================
# prod 환경 - 웹서버(Nginx) 전용 변수
# 이 파일의 값이 roles/webserver/defaults/main.yml 보다 우선 적용됨
# 대상 그룹: [webservers]
# =============================================================

---
# -------------------------------------------------------
# [Nginx 워커 설정 - prod 고성능]
# -------------------------------------------------------
nginx_worker_connections: 4096
# prod 환경은 동시 연결이 많으므로 기본 1024에서 4096으로 증가
# 전체 최대 = auto(코어수) × 4096
# c5.xlarge 4코어 기준: 4 × 4096 = 16,384개 동시 연결 처리 가능

# -------------------------------------------------------
# [Rate Limiting - prod 더 엄격]
# -------------------------------------------------------
nginx_rate_limit_enabled: true
nginx_rate_limit_zones:
  - name: "api"
    key: "$binary_remote_addr"
    size: "20m"              # prod는 더 많은 IP 추적 (20MB → 약 32만 IP)
    rate: "30r/s"            # prod에서 초당 30회 허용 (서비스 규모에 맞게)
    comment: "API 과부하 방지 (prod)"

  - name: "login"
    key: "$binary_remote_addr"
    size: "10m"
    rate: "5r/m"             # 로그인은 동일하게 분당 5회 유지 (보안 중요)
    comment: "로그인 브루트포스 방어 (prod)"

# -------------------------------------------------------
# [Upstream 연결 풀 - HAProxy가 없을 때 Nginx 직접 프록시]
# -------------------------------------------------------
nginx_upstream_enabled: false
# prod 환경에서는 보통 HAProxy가 앞에 있으므로 비활성
# HAProxy가 없으면 true로 변경

nginx_upstream_keepalive: 64
# prod는 더 많은 keepalive 연결 유지

# -------------------------------------------------------
# [Real IP 설정 - prod VPC CIDR]
# -------------------------------------------------------
nginx_real_ip_enabled: true
nginx_real_ip_from:
  - "10.0.0.0/16"     # prod VPC 전체 대역 (HAProxy, ALB IP)

# -------------------------------------------------------
# [정적 파일 캐시 - prod 더 길게]
# -------------------------------------------------------
nginx_static_cache_enabled: true
nginx_static_cache_days: 365      # prod에서 정적 파일은 1년 캐시 (변경 시 파일명 버전 포함)

# -------------------------------------------------------
# [프록시 버퍼 - prod 더 크게]
# -------------------------------------------------------
nginx_proxy_buffer_size: "16k"
nginx_proxy_buffers_number: 8
nginx_proxy_buffers_size: "32k"   # 총 256KB (대용량 응답에 여유 있게)
nginx_proxy_busy_buffers_size: "64k"

# -------------------------------------------------------
# [타임아웃 - prod 업무 특성에 맞게]
# -------------------------------------------------------
nginx_keepalive_timeout: 75        # 브라우저 기본값(75초) 에 맞춤
nginx_proxy_read_timeout: "120s"   # 복잡한 API 처리 시간 고려

# -------------------------------------------------------
# [로그 - prod JSON 형식 (ELK 연동)]
# -------------------------------------------------------
nginx_access_log_format: "json"
# JSON 형식으로 기록하면 Filebeat → Elasticsearch에서 파싱 없이 바로 사용 가능

# -------------------------------------------------------
# [도메인 설정]
# -------------------------------------------------------
nginx_server_name: "example.com www.example.com"
# prod 실제 도메인명으로 변경 필요
