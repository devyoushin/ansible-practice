# =============================================================
# 메인 플레이북 - site.yml
# 전체 인프라 오케스트레이션 (순서가 중요!)
#
# 실행:
#   ansible-playbook -i inventories/dev/hosts.ini playbooks/site.yml
#   ansible-playbook -i inventories/prod/hosts.ini playbooks/site.yml --ask-vault-pass
#
# 특정 태그만 실행:
#   ansible-playbook ... playbooks/site.yml --tags webserver
#   ansible-playbook ... playbooks/site.yml --tags "common,security"
#
# 특정 서버만 실행:
#   ansible-playbook ... playbooks/site.yml --limit webservers
#   ansible-playbook ... playbooks/site.yml --limit dev-web-01
# =============================================================

---
# ----------------------------
# 1. 전체 서버 공통 설정 (순서 1순위 - 기반 작업)
# ----------------------------
- name: 공통 서버 초기화
  hosts: all
  become: yes
  gather_facts: yes
  vars_files:
    - "{{ inventory_dir }}/group_vars/vault.yml"
  roles:
    - common
    - security
    - monitoring   # Node Exporter 전체 서버에 설치
  tags:
    - common
    - security
    - monitoring

# ----------------------------
# 2. 로드밸런서 (웹/앱 서버보다 먼저 설정)
# ----------------------------
- name: 로드밸런서 구성 (HAProxy)
  hosts: loadbalancers
  become: yes
  vars_files:
    - "{{ inventory_dir }}/group_vars/vault.yml"
  roles:
    - haproxy
  tags:
    - loadbalancer
    - haproxy

# ----------------------------
# 3. 데이터베이스 서버
# ----------------------------
- name: 데이터베이스 구성
  hosts: dbservers
  become: yes
  vars_files:
    - "{{ inventory_dir }}/group_vars/vault.yml"
  roles:
    - database
  tags:
    - database

# ----------------------------
# 4. 애플리케이션 서버 (DB 설정 후)
# ----------------------------
- name: 애플리케이션 서버 구성
  hosts: appservers
  become: yes
  vars_files:
    - "{{ inventory_dir }}/group_vars/vault.yml"
  roles:
    - app
  tags:
    - app
    - application

# ----------------------------
# 5. 웹서버
# ----------------------------
- name: 웹서버 구성 (Nginx)
  hosts: webservers
  become: yes
  gather_facts: yes
  roles:
    - webserver
  vars:
    allowed_ports:
      - { port: "80", proto: "tcp" }
      - { port: "443", proto: "tcp" }
  tags:
    - webserver
