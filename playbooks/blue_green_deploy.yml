---
# blue_green_deploy.yml — Blue-Green 무중단 배포
#
# ┌─────────────────────────────────────────────────┐
# │  Blue-Green 배포 전략                             │
# │                                                   │
# │  [현재: Blue 활성]    →    [전환: Green 활성]      │
# │                                                   │
# │  LB ─→ Blue  (v1)         LB ─→ Green (v2)       │
# │         Green (standby)          Blue  (standby)  │
# └─────────────────────────────────────────────────┘
#
# 특징:
#   - 전환 전 Green에 새 버전 배포 및 검증
#   - 문제 발생 시 LB 스위치만으로 즉시 롤백 (< 1초)
#   - 롤링 업데이트 대비 훨씬 빠른 롤백
#
# 사전 요구사항:
#   - HAProxy가 로드밸런서로 구성되어 있어야 함
#   - 앱 서버가 blue/green 그룹으로 인벤토리에 구분되어야 함
#   - HAProxy stats socket 활성화 필요
#
# 사용 예시:
#   # 새 버전 Green으로 배포 후 전환
#   ansible-playbook -i inventories/prod/hosts.ini playbooks/blue_green_deploy.yml \
#     -e "app_version=2.1.0"
#
#   # 즉시 Blue로 롤백 (이전 버전 복원)
#   ansible-playbook -i inventories/prod/hosts.ini playbooks/blue_green_deploy.yml \
#     -e "rollback=true"

# ─────────────────────────────────────────────────────
# PLAY 1: 현재 활성 슬롯 확인 및 전환 대상 결정
# ─────────────────────────────────────────────────────
- name: "Blue-Green: 현재 상태 확인 및 전환 계획 수립"
  hosts: loadbalancers
  become: true
  gather_facts: false

  vars:
    haproxy_stats_socket: /var/run/haproxy/admin.sock
    app_version: "{{ app_version | mandatory }}"
    rollback: false

  tasks:
    - name: 배포 변수 검증
      assert:
        that:
          - app_version is defined
          - app_version | length > 0
        fail_msg: "app_version 변수를 -e 옵션으로 지정해야 합니다."

    - name: HAProxy에서 현재 활성 백엔드 확인
      shell: >
        echo "show stat" | socat /var/run/haproxy/admin.sock stdio |
        awk -F',' '$2=="blue_backend" && $18=="UP" {print "blue"}
                   $2=="green_backend" && $18=="UP" {print "green"}' | head -1
      register: current_active_raw
      changed_when: false

    - name: 활성/대기 슬롯 결정
      set_fact:
        active_slot: "{{ current_active_raw.stdout | default('blue') }}"
        inactive_slot: "{{ 'blue' if current_active_raw.stdout == 'green' else 'green' }}"
        deploy_slot: "{{ 'blue' if (rollback | bool) else ('blue' if current_active_raw.stdout == 'green' else 'green') }}"

    - name: 배포 계획 출력
      debug:
        msg:
          - "현재 활성 슬롯: {{ active_slot }} (v{{ current_version | default('?') }})"
          - "배포 대상 슬롯: {{ deploy_slot }}"
          - "배포 버전: {{ app_version }}"
          - "롤백 모드: {{ rollback }}"

    # 다음 플레이에서 사용할 수 있도록 facts 저장
    - name: 배포 상태를 더미 호스트에 저장
      add_host:
        name: deploy_state
        active_slot: "{{ active_slot }}"
        inactive_slot: "{{ inactive_slot }}"
        deploy_slot: "{{ deploy_slot }}"

# ─────────────────────────────────────────────────────
# PLAY 2: 대기 슬롯(Green/Blue)에 새 버전 배포
# ─────────────────────────────────────────────────────
- name: "Blue-Green: 대기 슬롯에 새 버전 배포"
  hosts: "appservers_{{ hostvars['deploy_state']['deploy_slot'] }}"
  become: true
  serial: "100%"  # 대기 슬롯 전체를 동시에 배포 (트래픽 없음)

  vars:
    deploy_slot: "{{ hostvars['deploy_state']['deploy_slot'] }}"
    app_health_check_url: "http://localhost:8081/actuator/health"
    app_health_check_retries: 10
    app_health_check_delay: 10

  tasks:
    - name: "{{ deploy_slot }} 슬롯에 앱 배포 시작"
      debug:
        msg: "{{ deploy_slot }} 슬롯 배포 시작: v{{ app_version }}"

    - name: 앱 배포 (roles/app 재사용)
      include_role:
        name: app
        tasks_from: deploy
      vars:
        app_spring_profile: "{{ environment }}"

    - name: 앱 정상 기동 대기
      uri:
        url: "{{ app_health_check_url }}"
        return_content: true
        status_code: 200
      register: health_result
      retries: "{{ app_health_check_retries }}"
      delay: "{{ app_health_check_delay }}"
      until: >
        health_result.status == 200 and
        (health_result.json.status | default('DOWN')) == 'UP'
      changed_when: false

    - name: 스모크 테스트 — API 응답 확인
      uri:
        url: "http://localhost:{{ app_port }}/api/health"
        status_code: 200
      register: smoke_test
      changed_when: false

    - name: 스모크 테스트 결과 확인
      assert:
        that:
          - smoke_test.status == 200
        fail_msg: "스모크 테스트 실패! 배포를 중단합니다."
        success_msg: "{{ deploy_slot }} 슬롯 배포 성공 및 검증 완료"

# ─────────────────────────────────────────────────────
# PLAY 3: 로드밸런서 트래픽 전환
# ─────────────────────────────────────────────────────
- name: "Blue-Green: 로드밸런서 트래픽 전환"
  hosts: loadbalancers
  become: true
  gather_facts: false

  vars:
    deploy_slot: "{{ hostvars['deploy_state']['deploy_slot'] }}"
    active_slot: "{{ hostvars['deploy_state']['active_slot'] }}"
    haproxy_stats_socket: /var/run/haproxy/admin.sock

  tasks:
    - name: "새 버전 슬롯({{ deploy_slot }}) 활성화"
      shell: >
        echo "enable server appservers/{{ deploy_slot }}_backend" |
        socat {{ haproxy_stats_socket }} stdio
      changed_when: true

    - name: "이전 버전 슬롯({{ active_slot }}) 드레인 (신규 연결 차단, 기존 연결 유지)"
      shell: >
        echo "set server appservers/{{ active_slot }}_backend state drain" |
        socat {{ haproxy_stats_socket }} stdio
      changed_when: true

    - name: 기존 연결 완전 종료 대기 (graceful drain)
      pause:
        seconds: 30
        prompt: "기존 연결 드레인 중... (30초 대기)"

    - name: "이전 버전 슬롯({{ active_slot }}) 완전 비활성화"
      shell: >
        echo "disable server appservers/{{ active_slot }}_backend" |
        socat {{ haproxy_stats_socket }} stdio
      changed_when: true

    - name: 트래픽 전환 확인 (새 슬롯 응답 여부)
      uri:
        url: "http://{{ ansible_host }}/api/health"
        status_code: 200
      register: lb_health
      retries: 5
      delay: 3
      until: lb_health.status == 200
      changed_when: false

    - name: 트래픽 전환 완료 보고
      debug:
        msg:
          - "=== Blue-Green 배포 완료 ==="
          - "활성 슬롯: {{ deploy_slot }} (v{{ app_version }})"
          - "대기 슬롯: {{ active_slot }} (즉시 롤백 가능)"
          - "롤백 명령: ansible-playbook ... -e 'app_version={{ current_version | default(\"이전버전\") }} rollback=true'"

# ─────────────────────────────────────────────────────
# PLAY 4: 배포 결과 알림
# ─────────────────────────────────────────────────────
- name: "Blue-Green: 배포 완료 알림"
  hosts: localhost
  gather_facts: false

  vars:
    slack_webhook_url: "{{ vault_slack_webhook_url | default('') }}"
    deploy_slot: "{{ hostvars['deploy_state']['deploy_slot'] }}"
    active_slot: "{{ hostvars['deploy_state']['active_slot'] }}"

  tasks:
    - name: Slack 배포 완료 알림
      uri:
        url: "{{ slack_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: ":rocket: *Blue-Green 배포 완료*"
          attachments:
            - color: "good"
              fields:
                - title: "환경"
                  value: "{{ environment | default('prod') }}"
                  short: true
                - title: "버전"
                  value: "v{{ app_version }}"
                  short: true
                - title: "활성 슬롯"
                  value: "{{ deploy_slot }}"
                  short: true
                - title: "대기 슬롯 (롤백용)"
                  value: "{{ active_slot }}"
                  short: true
      when: slack_webhook_url != ""
      changed_when: false
      ignore_errors: true
