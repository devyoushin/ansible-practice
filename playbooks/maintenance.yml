# =============================================================
# 운영 유지보수 플레이북
#
# 태그별 선택 실행 예시:
#   ansible-playbook playbooks/maintenance.yml --tags disk_check
#   ansible-playbook playbooks/maintenance.yml --tags pkg_update --limit webservers
#   ansible-playbook playbooks/maintenance.yml --tags log_cleanup
# =============================================================
---
- name: 운영 유지보수
  hosts: all
  gather_facts: yes
  become: yes

  tasks:
    # ==========================================================
    # [1] 디스크 공간 확인 및 경고
    # ==========================================================
    - name: 디스크 사용률 수집
      shell: df -h --output=pcent,target | tail -n +2 | sed 's/%//'
      register: disk_usage
      changed_when: false
      tags: [disk_check]

    - name: 디스크 사용률 출력
      debug:
        msg: "{{ disk_usage.stdout_lines }}"
      tags: [disk_check]

    # assert: 조건을 만족하지 않으면 플레이 실패
    - name: 루트 파티션 디스크 사용률 검증 (85% 초과 시 경고)
      assert:
        that:
          - ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first > 1073741824
        fail_msg: "경고: {{ inventory_hostname }} 루트 파티션 여유 공간 1GB 미만!"
        success_msg: "{{ inventory_hostname }} 디스크 공간 정상"
      tags: [disk_check]

    # ==========================================================
    # [2] 오래된 로그 정리
    # ==========================================================
    - name: 오래된 애플리케이션 로그 정리
      find:
        paths:
          - "/var/log/{{ app_name | default('app') }}"
          - "/var/log/nginx"
        age: "{{ log_retention_days }}d"
        patterns: "*.log*"
        recurse: yes
      register: old_logs
      tags: [log_cleanup]

    - name: 정리할 로그 파일 목록
      debug:
        msg: "삭제할 파일 {{ old_logs.files | length }}개"
      tags: [log_cleanup]

    - name: 오래된 로그 삭제
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_logs.files }}"
      when: old_logs.files | length > 0
      tags: [log_cleanup]

    - name: journald 로그 정리 (30일 이상)
      command: journalctl --vacuum-time=30d
      changed_when: true
      tags: [log_cleanup]

    # ==========================================================
    # [3] 패키지 보안 업데이트
    # ==========================================================
    - name: 보안 패키지 업데이트 (security 태그만)
      yum:
        name: "*"
        security: yes
        state: latest
      register: pkg_update_result
      tags: [pkg_update]

    - name: 업데이트된 패키지 목록 출력
      debug:
        msg: "업데이트된 패키지: {{ pkg_update_result.changes | default({}) }}"
      tags: [pkg_update]

    # ==========================================================
    # [4] 서비스 상태 확인
    # ==========================================================
    - name: 핵심 서비스 상태 확인
      service_facts:
      tags: [service_check]

    # set_fact: 변수를 동적으로 설정
    - name: 확인할 서비스 목록 결정
      set_fact:
        services_to_check: >-
          {{
            ['nginx'] if 'webservers' in group_names else [] +
            ['mariadb'] if 'dbservers' in group_names else [] +
            ['haproxy'] if 'loadbalancers' in group_names else [] +
            ['node_exporter']
          }}
      tags: [service_check]

    - name: 서비스 실행 상태 검증
      assert:
        that:
          - "ansible_facts.services[item + '.service'] is defined"
          - "ansible_facts.services[item + '.service'].state == 'running'"
        fail_msg: "서비스 중단됨: {{ item }} on {{ inventory_hostname }}"
        success_msg: "서비스 정상: {{ item }}"
      loop: "{{ services_to_check }}"
      ignore_errors: yes
      tags: [service_check]

    # ==========================================================
    # [5] 재부팅 필요 여부 확인
    # ==========================================================
    - name: 재부팅 필요 여부 확인 (kernel 업데이트 등)
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      tags: [reboot_check]

    - name: 재부팅 필요 서버 목록 출력
      debug:
        msg: "재부팅 필요: {{ inventory_hostname }}"
      when: reboot_required.stat.exists
      tags: [reboot_check]

    # ==========================================================
    # [6] run_once: 전체 서버 중 딱 한 번만 실행
    # ==========================================================
    - name: 유지보수 완료 요약 (전체 중 1번만)
      debug:
        msg: |
          ==========================================
          유지보수 완료 보고서
          시간: {{ ansible_date_time.iso8601 }}
          환경: {{ environment }}
          대상: {{ ansible_play_hosts | length }}대
          ==========================================
      run_once: true
      delegate_to: localhost
      tags: [always]
