# =============================================================
# 데이터베이스 배포 플레이북
#
# 실행:
#   ansible-playbook -i inventories/prod playbooks/database.yml
#   ansible-playbook -i inventories/prod playbooks/database.yml --tags replication
# =============================================================
---
- name: MariaDB 설치 및 설정
  hosts: dbservers
  become: yes
  vars_files:
    - "{{ inventory_dir }}/group_vars/vault.yml"   # ansible-vault로 암호화된 시크릿

  roles:
    - role: database
